<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <title>WebRTCカメラ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #f3f4f6;
      color: #222;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .container {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    .panel {
      margin-bottom: 16px;
      padding: 16px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid #aaa;
      border-radius: 8px;
      font-size: 17px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      min-height: 56px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    #sendButton {
      background: #1769e0;
      color: white;
    }

    #viewButton {
      background: #15803d;
      color: white;
    }

    #stopButton {
      width: 100%;
      margin-top: 12px;
      background: #d1d5db;
      color: #222;
    }

   #driveStopButton {
  position: absolute;
  left: 68%;
  top: 4%;
  width: 28%;
  height: 15%;

  min-width: 100px;
  min-height: 52px;

  margin: 0;
  padding: 8px;

  z-index: 30;

  background: #dc2626;
  color: #ffffff;

  border: 3px solid #ffffff;
  border-radius: 12px;

  font-size: 20px;
  font-weight: bold;

  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#driveStopButtonText {
  pointer-events: none;
}

#stopResizeHandle {
  display: none;

  position: absolute;
  right: 2px;
  bottom: 0;

  width: 32px;
  height: 32px;

  align-items: center;
  justify-content: center;

  border-radius: 8px 0 8px 0;

  background: rgba(0, 0, 0, 0.45);
  color: #ffffff;

  font-size: 22px;
  line-height: 1;

  cursor: nwse-resize;
  touch-action: none;
}

    button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    #status {
      min-height: 48px;
      margin: 0;
      padding: 12px;
      background: #fff7d6;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    video {
      display: block;
      width: 100%;
      max-height: 70vh;
      margin-top: 14px;
      background: black;
      border-radius: 10px;
    }

    .hidden {
      display: none;
    }

    .note {
      margin-bottom: 0;
      color: #555;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }


    #videoWrapper {
  position: relative;
  overflow: hidden;

  width: 100%;

  background: #000000;
  border-radius: 10px;

  touch-action: none;
}
    
    #joystickArea {
    position: absolute;
    left: 0;
    top: 0;
    transform: translate(-50%, -50%);
    display: none;

    width: 140px;
    height: 140px;

    border-radius: 50%;

    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);

    z-index: 10;
    
}

#joystickKnob {
    position: absolute;

    left: 50%;
    top: 50%;

    width: 50px;
    height: 50px;

    margin-left: -25px;
    margin-top: -25px;

    border-radius: 50%;

    background: rgba(255,255,255,0.8);
}

    /* ======================================
   詳細設定
====================================== */

#settingsPanel {
  margin-top: 14px;
  border: 1px solid #d6d6d6;
  border-radius: 12px;
  background: #ffffff;
  overflow: hidden;
}

#settingsPanel summary {
  display: flex;
  align-items: center;
  min-height: 48px;
  padding: 0 16px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  user-select: none;
  list-style: none;
}

#settingsPanel summary::-webkit-details-marker {
  display: none;
}

#settingsPanel summary::before {
  content: "▶";
  display: inline-block;
  margin-right: 8px;
  font-size: 12px;
  transition: transform 0.2s;
}

#settingsPanel[open] summary::before {
  transform: rotate(90deg);
}

#settingsPanel[open] summary {

  background: #1769e0;
  color: #ffffff;

  border-bottom: 1px solid #1769e0;
}

#settingsPanel[open] summary::before {
  color: #ffffff;
}

.settingsContent {
  padding: 12px;
  background: #f5f6f7;
}

.settingsSection {
  margin-bottom: 12px;
  padding: 14px;
  border: 1px solid #dddddd;
  border-radius: 10px;
  background: #ffffff;
}

.settingsSection:last-child {
  margin-bottom: 0;
}

.settingsSectionTitle {
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #e5e5e5;
  font-size: 18px;
  font-weight: bold;
}

.settingsToggleRow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  cursor: pointer;
}

.settingsToggleRow input[type="checkbox"] {
  width: 22px;
  height: 22px;
  margin: 0;
  flex-shrink: 0;
  cursor: pointer;
}

.settingsText {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.settingsField {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.settingsLabel {
  font-size: 17px;
  font-weight: bold;
}

.settingsDescription {
  font-size: 14px;
  line-height: 1.5;
  color: #666666;
}

.settingsField select {
  width: 100%;
  min-height: 44px;
  margin-top: 6px;
  padding: 8px 36px 8px 10px;
  border: 1px solid #999999;
  border-radius: 6px;
  background: #ffffff;
  font-size: 17px;
  color: #222222;
}

/* iPhoneなどの狭い画面 */
@media (max-width: 600px) {
  #settingsPanel summary {
    min-height: 52px;
    padding: 0 14px;
  }

  .settingsContent {
    padding: 10px;
  }

  .settingsSection {
    padding: 13px;
  }

  .settingsToggleRow {
    gap: 12px;
  }

  .settingsField select {
    min-height: 48px;
    font-size: 16px;
  }
}

/* ======================================
   詳細設定内の操作ボタン
====================================== */

.settingsActionButton {

  width: 100%;
  min-height: 52px;
  padding: 12px;

  border: 1px solid #1769e0;
  border-radius: 8px;

  background: #1769e0;
  color: #ffffff;

  font-size: 17px;
  font-weight: bold;

  transition:
    background-color 0.2s,
    transform 0.15s;
}

.settingsActionButton:hover {
  background: #1457ba;
}

.settingsActionButton:active {
  transform: scale(0.98);
}

.settingsActionDescription {
  margin: 8px 2px 0;
}


/* ======================================
   STOPボタン編集画面
====================================== */

.stopEditorScreen {
  position: fixed;
  inset: 0;

  z-index: 1000;

  width: 100%;
  height: 100vh;
  height: 100dvh;

  overflow: auto;

  background: #f3f4f6;
}

.stopEditorHeader {
  position: sticky;
  top: 0;

  display: flex;
  align-items: center;
  justify-content: space-between;

  min-height: 64px;
  padding:
    max(8px, env(safe-area-inset-top))
    16px
    8px;

  z-index: 1010;

  background: rgba(255, 255, 255, 0.96);
  border-bottom: 1px solid #d1d5db;
}

.stopEditorTitle {
  font-size: 20px;
  font-weight: bold;
}

.finishStopEditorButton {

  min-height: 44px;
  padding: 0;

  border-radius: 22px;

  background: #1769e0;
  color: #ffffff;

  font-size: 27px;
  line-height: 1;
}

.stopEditorMessage {
  padding: 14px 16px;

  background: #fff7d6;
  color: #222222;

  font-size: 15px;
  line-height: 1.6;
}

#stopEditorStage {
  display: flex;
  justify-content: center;
  align-items: flex-start;

  width: 100%;
  padding: 16px;
}

#stopEditorStage #videoWrapper {
  width: min(100%, 1000px);

  aspect-ratio: 16 / 9;
  min-height: 240px;

  background: #000000;
  border: 2px solid #777777;
  border-radius: 12px;
}

#stopEditorStage #videoWrapper video {
  width: 100%;
  height: 100%;
  max-height: none;
  margin: 0;

  object-fit: contain;
  border-radius: 0;
}

#videoWrapper.stopButtonEditing #driveStopButton {

  border: 3px dashed #ffffff;
  box-shadow:

}

#videoWrapper.stopButtonEditing #stopResizeHandle {
  display: flex;
}

@media (max-width: 600px) {
  .stopEditorTitle {
    font-size: 19px;
  }

  .stopEditorMessage {
    font-size: 14px;
  }

  #stopEditorStage {
    padding: 10px;
  }
}

peerConnection.ontrack = event => {
  if (role !== "viewer") {

  }

  const [remoteStream] = event.streams;

      peerConnection.onconnectionstatechange = () => {

if (driveChannel) {

}

    function sendSignal(data) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      socket.send(JSON.stringify(data));
    }

    function connectWebSocket(roomName) {
      return new Promise((resolve, reject) => {
        const protocol =
          location.protocol === "https:" ? "wss:" : "ws:";

        const socketUrl =
          protocol +
          "//" +
          location.host +
          "/ws/" +
          encodeURIComponent(roomName);

        socket = new WebSocket(socketUrl);

        socket.onopen = () => {
          sendSignal({
            type: "role",
            role
          });

          if (role === "sender") {
            sendSignal({
              type: "sender-ready"
            });

            setStatus(
              "カメラを準備しました。\n" +
              "パソコン側の接続を待っています。"
            );
          } else {
            sendSignal({
              type: "viewer-ready"
            });

            setStatus(
              "受信準備ができました。\n" +
              "iPhone側の接続を待っています。"
            );
          }

          resolve();
        };

        socket.onmessage = async event => {
          try {
            const message = JSON.parse(event.data);
            await handleSignal(message);
          } catch (error) {
            console.error(error);
            setStatus("接続情報の処理中にエラーが発生しました。");
          }
        };

        socket.onerror = () => {
          reject(
            new Error("Cloudflareへの接続に失敗しました。")
          );
        };

        socket.onclose = () => {
          if (role !== null) {
            setStatus("Cloudflareとの接続が終了しました。");
          }
        };
      });
    }

    async function handleSignal(message) {
      if (message.type === "joined") {
        return;
      }

      if (message.type === "peer-joined") {
        if (role === "sender") {
          sendSignal({ type: "sender-ready" });
        } else if (role === "viewer") {
          sendSignal({ type: "viewer-ready" });
        }

        return;
      }

      if (
        message.type === "sender-ready" &&
        role === "viewer"
      ) {
        sendSignal({ type: "viewer-ready" });
        return;
      }

      if (
        message.type === "viewer-ready" &&
        role === "sender"
      ) {
        await createAndSendOffer();
        return;
      }

      if (
        message.type === "offer" &&
        role === "viewer"
      ) {
        await receiveOffer(message);
        return;
      }

      if (
        message.type === "answer" &&
        role === "sender"
      ) {
        await peerConnection.setRemoteDescription(
          message.answer
        );

        return;
      }

      if (message.type === "ice-candidate") {
        if (!peerConnection) {
          return;
        }

        try {
          await peerConnection.addIceCandidate(
            message.candidate
          );
        } catch (error) {
          console.error("ICE Candidate error:", error);
        }

        return;
      }

      if (message.type === "peer-left") {
        setStatus(
          "相手側の接続が終了しました。\n" +
          "両方で接続を終了してから、もう一度接続してください。"
        );
      }
    }

    async function createAndSendOffer() {
      if (
        role !== "sender" ||
        !peerConnection ||
        offerStarted
      ) {
        return;
      }

      offerStarted = true;

      try {
        const offer =
          await peerConnection.createOffer();

        await peerConnection.setLocalDescription(offer);

        sendSignal({
          type: "offer",
          offer: peerConnection.localDescription
        });

        setStatus("パソコンとWebRTC接続を開始しています。");
      } catch (error) {
        offerStarted = false;
        throw error;
      }
    }

    async function receiveOffer(message) {
      if (!peerConnection) {
        createPeerConnection();

        peerConnection.addTransceiver("video", {
          direction: "recvonly"
        });

        peerConnection.addTransceiver("audio", {
          direction: "recvonly"
        });
      }

      await peerConnection.setRemoteDescription(
        message.offer
      );

      const answer =
        await peerConnection.createAnswer();

      await peerConnection.setLocalDescription(answer);

      sendSignal({
        type: "answer",
        answer: peerConnection.localDescription
      });

      setStatus("iPhoneからの映像を接続しています。");
    }

    async function startSender() {
      try {
        role = "sender";
        offerStarted = false;
        setControlsConnected();

        setStatus(
          "iPhoneのカメラ使用許可を確認しています。"
        );

        localStream =
          await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: {
                ideal: "environment"
              },
              width: {
                ideal: 1280
              },
              height: {
                ideal: 720
              }
            },
            audio: true
          });

        videoElement.srcObject = localStream;
        videoElement.muted = true;
        videoElement.classList.remove("hidden");
        await videoElement.play();

        createPeerConnection();

        for (const track of localStream.getTracks()) {
          peerConnection.addTrack(track, localStream);
        }

        await connectWebSocket(getRoomName());
      } catch (error) {
        console.error(error);
        setStatus(
          "カメラを開始できませんでした。\n" +
          error.message
        );
        stopAll(false);
      }
    }

    async function startViewer() {
      try {
        role = "viewer";
        offerStarted = false;
        setControlsConnected();

        createPeerConnection();

        peerConnection.addTransceiver("video", {
          direction: "recvonly"
        });

        peerConnection.addTransceiver("audio", {
          direction: "recvonly"
        });

        await connectWebSocket(getRoomName());
      } catch (error) {
        console.error(error);
        setStatus(
          "受信を開始できませんでした。\n" +
          error.message
        );
        stopAll(false);
      }
    }

    function stopAll(showMessage = true) {
      role = null;
      offerStarted = false;

      if (socket) {
        socket.onclose = null;
        socket.close();
        socket = null;
      }

      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      if (localStream) {
        for (const track of localStream.getTracks()) {
          track.stop();
        }

        localStream = null;
      }

      videoElement.pause();
      videoElement.srcObject = null;
      videoElement.classList.add("hidden");
      videoElement.muted = true;

      joystickActive = false;
driveStopped = false;

driveStopButtonText.textContent = "STOP";
joystickArea.style.display = "none";

      joystickKnob.style.left = "50%";
      joystickKnob.style.top = "50%";

      xyDisplay.textContent = "X：0.00　Y：0.00";

      setControlsDisconnected();

      if (showMessage) {
        setStatus("接続を終了しました。");
      }
    }

   videoWrapper.addEventListener("pointerdown", event => {
  if (
    role !== "viewer" ||
    driveStopped ||
    settingsPanel.open ||
    stopEditorActive
  ) {
    return;
  }

  const rect = videoWrapper.getBoundingClientRect();

    joystickCenterX = Math.max(
    joystickRadius,
    Math.min(rect.width - joystickRadius, event.clientX - rect.left)
  );

  joystickCenterY = Math.max(
    joystickRadius,
    Math.min(rect.height - joystickRadius, event.clientY - rect.top)
  );

  joystickArea.style.left = joystickCenterX + "px";
  joystickArea.style.top = joystickCenterY + "px";
  joystickArea.style.display = "block";

  joystickKnob.style.left = "50%";
  joystickKnob.style.top = "50%";
  

  joystickActive = true;

  xyDisplay.textContent = "X：0.00　Y：0.00";
});


    function sendStopCommand() {
  if (driveChannel && driveChannel.readyState === "open") {
    driveSequence++;

    const stopData = {
      type: "drive",
      x: 0,
      y: 0,
      sequence: driveSequence
    };

    driveChannel.send(JSON.stringify(stopData));
  }

  xyDisplay.textContent = "X：0.00　Y：0.00";

  joystickKnob.style.left = "50%";
  joystickKnob.style.top = "50%";

      joystickActive = false;
}

function applyDriveStopState(stopped) {
  driveStopped = stopped;
  joystickActive = false;

  if (stopped) {
    xyDisplay.textContent = "X：0.00　Y：0.00";

    joystickKnob.style.left = "50%";
    joystickKnob.style.top = "50%";

    driveStopButtonText.textContent = "解除";

    if (!settingsPanel.open) {
      driveStatusElement.textContent =
        "非常停止中です。\n" +
        "再開するには「解除」を押してください。";
    }

  } else {

    driveStopButtonText.textContent = "STOP";

    if (!settingsPanel.open) {
      driveStatusElement.textContent =
        "非常停止を解除しました。\n" +
        "映像上をクリックして操作を再開してください。";
    }
  }
}

    function updateDriveStopButtonAvailability() {

  const channelConnected =
    driveChannel &&
    driveChannel.readyState === "open";

  const settingsActive =
    settingsPanel.open ||
    remoteSettingsActive;

  driveStopButton.disabled =
    !channelConnected ||
    settingsActive ||
    stopEditorActive;
}

function stopDrivingForSettings() {

  if (!settingsPanel.open) {
    return;
  }

  // 詳細設定中はSTOP解除ボタンを使用不可にする
  updateDriveStopButtonAvailability();

  // 自分側を停止状態にする
  applyDriveStopState(true);

  if (
    driveChannel &&
    driveChannel.readyState === "open"
  ) {
    // 相手へ停止命令を送る
    sendStopCommand();

    // 「詳細設定を開いた」ことを相手へ送る
    sendSettingsState(true);
  }

  driveStatusElement.textContent =
    "詳細設定中です。\n" +
    "操縦は一時停止しています。";
}

   settingsPanel.addEventListener("toggle", () => {

  if (settingsPanel.open) {

    stopDrivingForSettings();

  } else {

    // 自分側の詳細設定を閉じたため，
    // 相手側も詳細設定中でなければボタンを戻す
    updateDriveStopButtonAvailability();

    if (driveStopped) {

      sendSettingsState(false);

      driveStatusElement.textContent =
        "詳細設定を終了しました。\n" +
        "「解除」を押すと操縦を再開できます。";
    }
  }

});

function sendSettingsState(active) {

  if (
    !driveChannel ||
    driveChannel.readyState !== "open"
  ) {
    return;
  }

  driveSequence++;

  const settingsStateData = {
    type: "settings-state",
    active: active,
    sequence: driveSequence
  };

  driveChannel.send(
    JSON.stringify(settingsStateData)
  );
}
    
    function sendDriveStopState(stopped) {
  if (
    !driveChannel ||
    driveChannel.readyState !== "open"
  ) {
    return;
  }

  driveSequence++;

  const stopStateData = {
    type: "drive-stop-state",
    stopped: stopped,
    sequence: driveSequence
  };

  driveChannel.send(JSON.stringify(stopStateData));
}

   function handleDriveChannelMessage(event) {
  console.log("受信", event.data);

  try {
    const command = JSON.parse(event.data);

    console.log("受信した命令", command);

   // 詳細設定の開閉状態を受信した場合
if (command.type === "settings-state") {

  remoteSettingsActive =
    command.active === true;

  // 相手が詳細設定中なら，
  // 自分側の解除ボタンも使用不可にする
  updateDriveStopButtonAvailability();

  if (remoteSettingsActive) {

    applyDriveStopState(true);

    driveStatusElement.textContent =
      "詳細設定中です。\n" +
      "操縦は一時停止しています。";

  } else {

    driveStatusElement.textContent =
      "詳細設定を終了しました。\n" +
      "「解除」を押すと操縦を再開できます。";
  }

  return;
}


// STOP・STOP解除の状態を受信した場合
if (command.type === "drive-stop-state") {
  applyDriveStopState(command.stopped === true);
  return;
}

    // 操縦命令を受信した場合
    if (command.type === "drive") {

      // 非常停止中は，0以外の操縦命令をすべて無視する
      if (
        driveStopped &&
        (command.x !== 0 || command.y !== 0)
      ) {
        console.log(
          "非常停止中のため操縦命令を無視しました",
          command
        );

        driveStatusElement.textContent =
          "非常停止中です。\n" +
          "操縦命令を無視しました。";

        return;
      }

      driveStatusElement.textContent =
        "操縦命令を受信しました。\n" +
        "X：" + command.x + "\n" +
        "Y：" + command.y + "\n" +
        "sequence：" + command.sequence;
    }

  } catch (error) {
    console.error(
      "受信データをJSONとして読めませんでした",
      error
    );

    setStatus("受信データの読み取りに失敗しました。");
  }
}

   videoWrapper.addEventListener("pointermove", event => {
  if (
    role !== "viewer" ||
    !joystickActive ||
    driveStopped ||
    settingsPanel.open ||
    stopEditorActive
  ) {
    return;
  }

  // 以下ジョイスティック移動処理

  const rect = videoWrapper.getBoundingClientRect();

  const pointerX = event.clientX - rect.left;
  const pointerY = event.clientY - rect.top;

  let dx = pointerX - joystickCenterX;
  let dy = pointerY - joystickCenterY;

  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance > maxKnobDistance) {
    dx = dx / distance * maxKnobDistance;
    dy = dy / distance * maxKnobDistance;
  }

  joystickKnob.style.left =
    (joystickRadius + dx) + "px";

  joystickKnob.style.top =
    (joystickRadius + dy) + "px";

    

  const x = dx / maxKnobDistance;
  const y = -dy / maxKnobDistance;

  xyDisplay.textContent =
    "X：" + x.toFixed(2) +
    "　Y：" + y.toFixed(2);

  if (driveChannel &&
      driveChannel.readyState === "open") {

    driveSequence++;

    const driveData = {
      type: "drive",
      x: Number(x.toFixed(2)),
      y: Number(y.toFixed(2)),
      sequence: driveSequence
    };

    driveChannel.send(JSON.stringify(driveData));
  }
});


sendButton.addEventListener("click", startSender);
viewButton.addEventListener("click", startViewer);

function toggleDriveStop(event) {
  event.preventDefault();
  event.stopPropagation();

  // STOPボタン編集中は操作しない
  if (stopEditorActive) {
    return;
  }

  // 自分または相手が詳細設定中なら解除しない
  if (
    settingsPanel.open ||
    remoteSettingsActive
  ) {
    return;
  }

  const newStoppedState = !driveStopped;

  if (newStoppedState) {

    // 押した端末を直ちに非常停止にする
    applyDriveStopState(true);

    // 相手へX=0，Y=0を送る
    sendStopCommand();

    // 相手側も非常停止表示にする
    sendDriveStopState(true);

  } else {

    // 押した端末の非常停止を解除する
    applyDriveStopState(false);

    // 相手側も解除する
    sendDriveStopState(false);
  }
}

driveStopButton.addEventListener(
  "pointerdown",
  toggleDriveStop
);
    
stopButton.addEventListener("click", () => stopAll(true));

    window.addEventListener("beforeunload", () => {
      stopAll(false);
    });

    // ======================================
// 詳細設定の保存
// ======================================

function loadSettings() {

  const savedPcKey =
    localStorage.getItem("pcStopKey");

  if (savedPcKey !== null) {
    pcStopKey.value = savedPcKey;
  }

  const savedGesture =
    localStorage.getItem(
      "iphoneStopGesture"
    );

  if (savedGesture !== null) {
    iphoneStopGesture.value =
      savedGesture;
  }
}


function saveSettings() {

  localStorage.setItem(
    "pcStopKey",
    pcStopKey.value
  );

  localStorage.setItem(
    "iphoneStopGesture",
    iphoneStopGesture.value
  );
}


// ----------
// 変更されたら保存
// ----------

pcStopKey.addEventListener(
  "change",
  saveSettings
);

iphoneStopGesture.addEventListener(
  "change",
  saveSettings
);




// ----------
// 起動時に読み込み
// ----------

loadSettings();
    
  </script>
