<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <title>WebRTCカメラ</title>


  
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    color-scheme: dark;

    --page-bg: #050c1c;
    --panel-bg: rgba(12, 24, 48, 0.94);
    --panel-bg-light: rgba(20, 36, 67, 0.96);
    --border-color: rgba(148, 173, 220, 0.18);

    --text-main: #f7f9ff;
    --text-sub: #aab8d4;

    --blue-start: #5265ed;
    --blue-end: #3347c6;

    --green-start: #3e927b;
    --green-end: #246758;

    --gray-start: #33415f;
    --gray-end: #202c46;

    --danger-start: #f04444;
    --danger-end: #d7222c;

    --accent: #62df83;
  }

  body {
    min-height: 100vh;
    margin: 0;
    padding: 14px;
    background:
      radial-gradient(
        circle at top left,
        rgba(56, 81, 160, 0.25),
        transparent 38%
      ),
      linear-gradient(
        180deg,
        #050b18 0%,
        #071329 55%,
        #050b18 100%
      );
    color: var(--text-main);
    font-family:
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      "Hiragino Sans",
      "Yu Gothic",
      Meiryo,
      sans-serif;
  }

  button,
  input,
  select {
    font: inherit;
  }

  button {
    -webkit-tap-highlight-color: transparent;
  }

  .container {
    width: min(920px, 100%);
    margin: 0 auto;
  }

  /* ======================================
     上部ヘッダー
  ====================================== */

  .appHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
    padding: 4px 4px 2px;
  }

  .appTitleArea {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .cameraLogo {
    position: relative;
    display: grid;
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    place-items: center;
    border: 1px solid rgba(117, 155, 255, 0.28);
    border-radius: 50%;
    background:
      radial-gradient(
        circle,
        #5dd3ff 0 12%,
        #162447 13% 28%,
        #5874ff 29% 37%,
        #101b35 38% 58%,
        #223c72 59% 100%
      );
    box-shadow:
      0 0 24px rgba(68, 113, 255, 0.35),
      inset 0 0 12px rgba(255, 255, 255, 0.18);
  }

  .cameraLogo::after {
    content: "";
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.85);
    filter: blur(1px);
    transform: translate(-5px, -5px);
  }

  .appTitleText {
    min-width: 0;
  }

  h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 27px);
    line-height: 1.15;
    letter-spacing: 0.02em;
  }

  .appSubtitle {
    margin: 5px 0 0;
    color: var(--text-sub);
    font-size: 13px;
  }

  .headerBadge {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
    padding: 9px 13px;
    border: 1px solid rgba(129, 157, 210, 0.22);
    border-radius: 999px;
    background: rgba(12, 24, 48, 0.72);
    color: #dbe6ff;
    font-size: 13px;
    font-weight: bold;
  }

  .headerBadgeDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(98, 223, 131, 0.8);
  }

  /* ======================================
     共通パネル
  ====================================== */

  .panel {
    position: relative;
    margin-bottom: 14px;
    padding: 15px;
    overflow: hidden;
    border: 1px solid var(--border-color);
    border-radius: 17px;
    background:
      linear-gradient(
        145deg,
        rgba(17, 31, 59, 0.97),
        rgba(8, 19, 40, 0.98)
      );
    box-shadow:
      0 16px 38px rgba(0, 0, 0, 0.27),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(
        110deg,
        rgba(255, 255, 255, 0.025),
        transparent 32%
      );
  }

  .panel > * {
    position: relative;
    z-index: 1;
  }

  /* ======================================
     部屋名入力
  ====================================== */

  .roomRow {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 12px;
  }

  .roomField {
    flex: 1;
    min-width: 0;
  }

  label {
    display: block;
    margin-bottom: 6px;
    color: #dce6fb;
    font-size: 14px;
    font-weight: bold;
  }

  input {
    width: 100%;
    min-height: 46px;
    margin: 0;
    padding: 10px 13px;
    border: 1px solid rgba(151, 177, 225, 0.32);
    border-radius: 10px;
    outline: none;
    background: rgba(3, 10, 25, 0.72);
    color: #ffffff;
    font-size: 16px;
    transition:
      border-color 0.2s,
      box-shadow 0.2s;
  }

  input:focus {
    border-color: #6f8eff;
    box-shadow: 0 0 0 3px rgba(86, 119, 255, 0.18);
  }

  input:disabled {
    color: #9ca9c3;
    background: rgba(6, 13, 28, 0.5);
  }

  /* ======================================
     3つの操作ボタン
  ====================================== */

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

 .mainActionButton {
  position: relative;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 100%;
  min-width: 0;
  min-height: 72px;
  padding: 10px 12px;

  overflow: hidden;

  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 13px;

  color: #ffffff;
  cursor: pointer;

  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.14),
    0 8px 19px rgba(0, 0, 0, 0.18);

  transition:
    transform 0.15s,
    filter 0.2s,
    box-shadow 0.2s;
}

  .mainActionButton:hover:not(:disabled) {
    filter: brightness(1.08);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.18),
      0 12px 24px rgba(0, 0, 0, 0.24);
  }

  .mainActionButton:active:not(:disabled) {
    transform: scale(0.98);
  }

 .mainActionIcon {
  position: absolute;
  left: calc(50% - 65px);

  display: grid;
  width: 34px;
  height: 34px;
  place-items: center;
}

  .mainActionIcon svg {
    width: 29px;
    height: 29px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

 .mainActionText {
  display: flex;
  min-width: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;

  margin: 0;
   transform: translateX(10px);
}

.mainActionTitle {
  font-size: 15px;
  font-weight: bold;
  line-height: 1.25;
  white-space: nowrap;
}

 

  .mainActionDescription {
    color: rgba(255, 255, 255, 0.72);
    font-size: 10px;
    font-weight: normal;
    line-height: 1.25;
  }

  #sendButton {
    background:
      linear-gradient(
        145deg,
        var(--blue-start),
        var(--blue-end)
      );
  }

  #viewButton {
    background:
      linear-gradient(
        145deg,
        var(--green-start),
        var(--green-end)
      );
  }

  #stopButton {
    margin: 0;
    background:
      linear-gradient(
        145deg,
        var(--gray-start),
        var(--gray-end)
      );
  }

  button:disabled {
    cursor: default;
    opacity: 0.48;
    filter: saturate(0.55);
  }

  .note {
    margin: 11px 1px 0;
    color: var(--text-sub);
    font-size: 12px;
    line-height: 1.55;
  }

  /* ======================================
     詳細設定
  ====================================== */

  #settingsPanel {
    margin-top: 12px;
    overflow: hidden;
    border: 1px solid rgba(140, 168, 220, 0.21);
    border-radius: 12px;
    background: rgba(14, 27, 52, 0.82);
  }

  #settingsPanel summary {
    display: flex;
    align-items: center;
    min-height: 48px;
    padding: 0 14px;
    cursor: pointer;
    color: #edf3ff;
    font-size: 14px;
    font-weight: bold;
    list-style: none;
    user-select: none;
  }

  #settingsPanel summary::-webkit-details-marker {
    display: none;
  }

  #settingsPanel summary::before {
    content: "";
    width: 18px;
    height: 18px;
    margin-right: 10px;
    background:
      linear-gradient(#9eb3dc, #9eb3dc) 2px 5px / 14px 2px no-repeat,
      linear-gradient(#9eb3dc, #9eb3dc) 2px 11px / 14px 2px no-repeat,
      radial-gradient(circle, #ffffff 0 2px, transparent 2.5px)
        5px 6px / 6px 6px no-repeat,
      radial-gradient(circle, #ffffff 0 2px, transparent 2.5px)
        10px 12px / 6px 6px no-repeat;
  }

  #settingsPanel summary::after {
    content: "›";
    margin-left: auto;
    color: #aebdde;
    font-size: 25px;
    font-weight: normal;
    line-height: 1;
    transition: transform 0.2s;
  }

  #settingsPanel[open] summary {
    border-bottom: 1px solid rgba(140, 168, 220, 0.17);
    background: rgba(34, 56, 98, 0.72);
  }

  #settingsPanel[open] summary::after {
    transform: rotate(90deg);
  }

  .settingsContent {
    padding: 11px;
    background: rgba(4, 13, 30, 0.5);
  }

  .settingsSection {
    margin-bottom: 10px;
    padding: 13px;
    overflow: hidden;
    border: 1px solid rgba(140, 168, 220, 0.17);
    border-radius: 10px;
    background: rgba(18, 33, 61, 0.88);
  }

  .settingsSection:last-child {
    margin-bottom: 0;
  }

  .settingsSectionTitle {
    margin: -13px -13px 12px;
    padding: 9px 13px;
    border-bottom: 1px solid rgba(105, 145, 220, 0.18);
    background: rgba(35, 62, 111, 0.68);
    color: #cfe0ff;
    font-size: 15px;
    font-weight: bold;
  }

  .settingsToggleRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    cursor: pointer;
  }

  .settingsToggleRow input[type="checkbox"] {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    margin: 0;
    cursor: pointer;
  }

  .settingsText {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .settingsField {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin: 0;
  }

  .settingsLabel {
    color: #f0f5ff;
    font-size: 15px;
    font-weight: bold;
  }

  .settingsDescription {
    color: #9eadc8;
    font-size: 12px;
    line-height: 1.5;
  }

  .settingsField select {
    width: 100%;
    min-height: 44px;
    margin-top: 5px;
    padding: 8px 36px 8px 11px;
    border: 1px solid rgba(151, 177, 225, 0.32);
    border-radius: 8px;
    outline: none;
    background: #0a1730;
    color: #ffffff;
    font-size: 15px;
  }

  .settingsActionButton {
    width: 100%;
    min-height: 48px;
    padding: 10px 12px;
    border: 1px solid rgba(125, 160, 228, 0.42);
    border-radius: 9px;
    background:
      linear-gradient(
        145deg,
        rgba(49, 82, 143, 0.82),
        rgba(29, 52, 99, 0.9)
      );
    color: #ffffff;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition:
      transform 0.15s,
      filter 0.2s;
  }

  .settingsActionButton:hover {
    filter: brightness(1.12);
  }

  .settingsActionButton:active {
    transform: scale(0.98);
  }

  .settingsActionDescription {
    margin: 8px 2px 0;
  }

  /* ======================================
     状態表示
  ====================================== */

 
.compactStatusRow {
  display: flex;
  align-items: flex-start;
  width: 100%;
  gap: 6px;
  margin: 0 0 6px;
}

#xyDisplay,
#driveStatus {
  display: block;

  box-sizing: border-box;
  min-height: 24px;
  margin: 0;
  padding: 3px 7px;

  border: 1px solid rgba(129, 157, 210, 0.16);
  border-radius: 8px;

  background: rgba(4, 12, 28, 0.72);
  color: #dce7ff;

  font-family:
    ui-monospace,
    SFMono-Regular,
    Consolas,
    monospace;

  font-size: 12px;
  line-height: 16px;
}

#xyDisplay {
  flex: 0 0 auto;
  white-space: nowrap;
}

#driveStatus {
  flex: 1 1 auto;
  min-width: 0;

  text-align: left;

  white-space: normal;
  overflow-wrap: anywhere;
}

.hiddenStatus {
  display: none;
}

.connectionPanel {
  padding: 8px 10px 10px;
}

  /* ======================================
     映像領域
  ====================================== */

  #videoWrapper {
    position: relative;
    width: 100%;
    overflow: hidden;
    border: 1px solid rgba(140, 168, 220, 0.2);
    border-radius: 13px;
    background:
      radial-gradient(
        circle at center,
        #101b31,
        #01040b 72%
      );
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.025),
      0 10px 24px rgba(0, 0, 0, 0.24);
    touch-action: none;
  }

  video {
    display: block;
    width: 100%;
    max-height: 78vh;
    margin: 0;
    border-radius: 0;
    background: #000000;
    object-fit: contain;
  }

  .hidden {
    display: none !important;
  }

  /* ======================================
     映像上のSTOPボタン
  ====================================== */

  #driveStopButton {
    position: absolute;
    left: 68%;
    top: 4%;

    width: 28%;
    height: 15%;
    min-width: 100px;
    min-height: 52px;

    margin: 0;
    padding: 8px;

    z-index: 30;

    border: 2px solid rgba(255, 255, 255, 0.88);
    border-radius: 11px;

    background:
      linear-gradient(
        145deg,
        var(--danger-start),
        var(--danger-end)
      );
    color: #ffffff;

    font-size: 16px;
    font-weight: bold;

    box-shadow:
      0 8px 19px rgba(125, 0, 12, 0.36),
      inset 0 1px 0 rgba(255, 255, 255, 0.22);

    cursor: pointer;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #driveStopButton::before {
    content: "";
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-right: 7px;
    border-radius: 2px;
    background: #ffffff;
    vertical-align: -1px;
  }

  #driveStopButton:disabled::before {
    opacity: 0.7;
  }

  #driveStopButtonText {
    pointer-events: none;
  }

  #stopResizeHandle {
    display: none;
    position: absolute;
    right: 2px;
    bottom: 0;
    width: 32px;
    height: 32px;
    align-items: center;
    justify-content: center;
    border-radius: 8px 0 8px 0;
    background: rgba(0, 0, 0, 0.48);
    color: #ffffff;
    font-size: 22px;
    line-height: 1;
    cursor: nwse-resize;
    touch-action: none;
  }

  /* ======================================
     ジョイスティック
  ====================================== */

  #joystickArea {
    position: absolute;
    left: 0;
    top: 0;
    display: none;
    width: 140px;
    height: 140px;
    transform: translate(-50%, -50%);
    z-index: 10;
    border: 2px solid rgba(255, 255, 255, 0.42);
    border-radius: 50%;
    background: rgba(8, 18, 38, 0.3);
    box-shadow:
      0 0 0 8px rgba(0, 0, 0, 0.08),
      inset 0 0 25px rgba(255, 255, 255, 0.08);
  }

  #joystickKnob {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50px;
    height: 50px;
    margin-left: -25px;
    margin-top: -25px;
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.82);
    box-shadow: 0 4px 13px rgba(0, 0, 0, 0.35);
  }

  /* ======================================
     STOPボタン編集画面
  ====================================== */

  .stopEditorScreen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: auto;
    background:
      radial-gradient(
        circle at top left,
        rgba(56, 81, 160, 0.25),
        transparent 38%
      ),
      #050c1c;
  }

  .stopEditorHeader {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
    padding:
      max(8px, env(safe-area-inset-top))
      16px
      8px;
    z-index: 1010;
    border-bottom: 1px solid rgba(140, 168, 220, 0.22);
    background: rgba(7, 17, 38, 0.96);
    backdrop-filter: blur(14px);
  }

  .stopEditorTitle {
    font-size: 20px;
    font-weight: bold;
  }

  .finishStopEditorButton {
    display: grid;
    width: 48px;
    min-height: 44px;
    padding: 0;
    place-items: center;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 22px;
    background:
      linear-gradient(
        145deg,
        var(--blue-start),
        var(--blue-end)
      );
    color: #ffffff;
    font-size: 27px;
    line-height: 1;
    cursor: pointer;
  }

  .stopEditorMessage {
    padding: 13px 16px;
    border-bottom: 1px solid rgba(140, 168, 220, 0.15);
    background: rgba(52, 43, 15, 0.68);
    color: #fff2bd;
    font-size: 14px;
    line-height: 1.6;
  }

  #stopEditorStage {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    padding: 16px;
  }

  #stopEditorStage #videoWrapper {
    width: min(100%, 1000px);
    min-height: 240px;
    border: 2px solid rgba(130, 160, 220, 0.46);
    border-radius: 13px;
    background: #000000;
  }

  #stopEditorStage #videoWrapper video {
    width: 100%;
    height: 100%;
    max-height: none;
    margin: 0;
    object-fit: contain;
  }

  #videoWrapper.stopButtonEditing #driveStopButton {
    cursor: move;
    border: 3px dashed #ffffff;
    box-shadow:
      0 0 0 3px rgba(87, 119, 255, 0.9),
      0 7px 18px rgba(0, 0, 0, 0.46);
  }

  #videoWrapper.stopButtonEditing #stopResizeHandle {
    display: flex;
  }

  /* ======================================
     スマートフォン
  ====================================== */

  @media (max-width: 700px) {
    body {
      padding: 8px;
    }

    .appHeader {
      margin-bottom: 9px;
      padding: 2px;
    }

    .cameraLogo {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: 19px;
    }

    .appSubtitle {
      font-size: 10px;
    }

    .headerBadge {
      padding: 7px 9px;
      font-size: 11px;
    }

    .panel {
      margin-bottom: 9px;
      padding: 10px;
      border-radius: 13px;
    }

    .roomRow {
      margin-bottom: 9px;
    }

    input {
      min-height: 40px;
      padding: 8px 10px;
      font-size: 14px;
    }

    label {
      margin-bottom: 4px;
      font-size: 11px;
    }

    .buttons {
      gap: 6px;
    }

    .mainActionButton {
  min-height: 62px;
  padding: 7px 5px;
  border-radius: 10px;
}

   .mainActionIcon {
  left: calc(50% - 42px);
  width: 25px;
  height: 25px;
}

    .mainActionIcon svg {
      width: 22px;
      height: 22px;
    }

    .mainActionTitle {
  font-size: 12px;
  white-space: nowrap;
}

#sendButton .mainActionText {
  transform: translateX(11px);
}

#viewButton .mainActionText {
  transform: translateX(8px);
}

#stopButton .mainActionText {
  transform: translateX(8px);
}
    
    .mainActionDescription {
      display: none;
    }

    .note {
      margin-top: 8px;
      font-size: 9px;
    }

    #settingsPanel {
      margin-top: 9px;
    }

    #settingsPanel summary {
      min-height: 42px;
      padding: 0 11px;
      font-size: 12px;
    }

    .compactStatusRow {
  gap: 4px;
  margin-bottom: 5px;
}

#xyDisplay,
#driveStatus {
  min-height: 22px;
  padding: 2px 6px;
  font-size: 10px;
  line-height: 16px;
}

#driveStatus {
  max-width: calc(100% - 105px);
}

.connectionPanel {
  padding: 7px 8px 8px;
}

    #videoWrapper {
      border-radius: 9px;
    }

    video {
      max-height: 82vh;
    }

    #driveStopButton {
      min-width: 78px;
      min-height: 44px;
      border-radius: 9px;
      font-size: 12px;
    }

    #driveStopButton::before {
      width: 10px;
      height: 10px;
      margin-right: 5px;
    }

    .settingsContent {
      padding: 8px;
    }

    .settingsSection {
      padding: 11px;
    }

    .settingsSectionTitle {
      margin: -11px -11px 10px;
      padding: 8px 11px;
      font-size: 13px;
    }

    .settingsActionButton {
      min-height: 43px;
      font-size: 13px;
    }

    .settingsField select {
      min-height: 42px;
      font-size: 14px;
    }

    #stopEditorStage {
      padding: 9px;
    }
  }

  @media (max-width: 370px) {
    .mainActionButton {
      min-height: 59px;
    }

    .mainActionIcon {
      display: none;
    }

    .mainActionTitle {
      font-size: 10px;
    }

    .headerBadge {
      display: none;
    }
  }
</style>

    function sendSignal(data) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      socket.send(JSON.stringify(data));

    function connectWebSocket(roomName) {
      return new Promise((resolve, reject) => {
        const protocol =
          location.protocol === "https:" ? "wss:" : "ws:";

        const socketUrl =
          protocol +
          "//" +
          location.host +
          "/ws/" +
          encodeURIComponent(roomName);

        socket = new WebSocket(socketUrl);

        socket.onopen = () => {
          sendSignal({
            type: "role",
            role
          });

          if (role === "sender") {
            sendSignal({
              type: "sender-ready"
            });

            setStatus(
              "カメラを準備しました。\n" +
              "パソコン側の接続を待っています。"
            );
          } else {
            sendSignal({
              type: "viewer-ready"
            });

            setStatus(
              "受信準備ができました。\n" +
              "iPhone側の接続を待っています。"
            );
          }

          resolve();
        };

        socket.onmessage = async event => {
          try {
            const message = JSON.parse(event.data);
            await handleSignal(message);
          } catch (error) {
            console.error(error);
            setStatus("接続情報の処理中にエラーが発生しました。");
          }
        };

        socket.onerror = () => {
          reject(
            new Error("Cloudflareへの接続に失敗しました。")
          );
        };

        socket.onclose = () => {
          if (role !== null) {
            setStatus("Cloudflareとの接続が終了しました。");
          }
        };
      });
    }

    async function handleSignal(message) {
      if (message.type === "joined") {
        return;
      }

      if (message.type === "peer-joined") {
        if (role === "sender") {
          sendSignal({ type: "sender-ready" });
        } else if (role === "viewer") {
          sendSignal({ type: "viewer-ready" });
        }

        return;
      }

      if (
        message.type === "sender-ready" &&
        role === "viewer"
      ) {
        sendSignal({ type: "viewer-ready" });
        return;
      }

      if (
        message.type === "viewer-ready" &&
        role === "sender"
      ) {
        await createAndSendOffer();
        return;
      }

      if (
        message.type === "offer" &&
        role === "viewer"
      ) {
        await receiveOffer(message);
        return;
      }

      if (
        message.type === "answer" &&
        role === "sender"
      ) {
        await peerConnection.setRemoteDescription(
          message.answer
        );

        return;
      }

      if (message.type === "ice-candidate") {
        if (!peerConnection) {
          return;
        }

        try {
          await peerConnection.addIceCandidate(
            message.candidate
          );
        } catch (error) {
          console.error("ICE Candidate error:", error);
        }

        return;
      }

      if (message.type === "peer-left") {
        setStatus(
          "相手側の接続が終了しました。\n" +
          "両方で接続を終了してから、もう一度接続してください。"
        );
      }
    }

    async function createAndSendOffer() {
      if (
        role !== "sender" ||
        !peerConnection ||
        offerStarted
      ) {
        return;
      }

      offerStarted = true;

      try {
        const offer =
          await peerConnection.createOffer();

        await peerConnection.setLocalDescription(offer);

        sendSignal({
          type: "offer",
          offer: peerConnection.localDescription
        });

        setStatus("パソコンとWebRTC接続を開始しています。");
      } catch (error) {
        offerStarted = false;
        throw error;
      }
    }

    async function receiveOffer(message) {
      if (!peerConnection) {
        createPeerConnection();

        peerConnection.addTransceiver("video", {
          direction: "recvonly"
        });

        peerConnection.addTransceiver("audio", {
          direction: "recvonly"
        });

      await peerConnection.setRemoteDescription(
        message.offer
      );

      const answer =
        await peerConnection.createAnswer();

      await peerConnection.setLocalDescription(answer);

      sendSignal({
        type: "answer",
        answer: peerConnection.localDescription
      });

      setStatus("iPhoneからの映像を接続しています。");
    }

    // 相手へ停止命令を送る
    sendStopCommand();

    // 「詳細設定を開いた」ことを相手へ送る
    sendSettingsState(true);
  }

  driveStatusElement.textContent =
    "詳細設定中です。操縦は一時停止しています。";
}

   settingsPanel.addEventListener("toggle", () => {

  if (settingsPanel.open) {

    stopDrivingForSettings();

  } else {

    // 自分側の詳細設定を閉じたため，
    // 相手側も詳細設定中でなければボタンを戻す
    updateDriveStopButtonAvailability();

    if (driveStopped) {

      sendSettingsState(false);

      driveStatusElement.textContent =
        "詳細設定を終了しました。「解除」を押すと操縦を再開できます。";
    }
  }

});

function sendSettingsState(active) {

  if (
    !driveChannel ||
    driveChannel.readyState !== "open"
  ) {
    return;
  }

  driveSequence++;

  const settingsStateData = {
    type: "settings-state",
    active: active,
    sequence: driveSequence
  };

  driveChannel.send(
    JSON.stringify(settingsStateData)
  );
}
    
    function sendDriveStopState(stopped) {
  if (
    !driveChannel ||
    driveChannel.readyState !== "open"
  ) {
    return;
  }

  driveSequence++;

  const stopStateData = {
    type: "drive-stop-state",
    stopped: stopped,
    sequence: driveSequence
  };

  driveChannel.send(JSON.stringify(stopStateData));
}

   function handleDriveChannelMessage(event) {
  console.log("受信", event.data);

  try {
    const command = JSON.parse(event.data);

    console.log("受信した命令", command);

   // 詳細設定の開閉状態を受信した場合
if (command.type === "settings-state") {

  remoteSettingsActive =
    command.active === true;

  // 相手が詳細設定中なら，
  // 自分側の解除ボタンも使用不可にする
  updateDriveStopButtonAvailability();

  if (remoteSettingsActive) {

    applyDriveStopState(true);

    driveStatusElement.textContent =
      "詳細設定中です。操縦は一時停止しています。";

  } else {

    driveStatusElement.textContent =
      "詳細設定を終了しました。「解除」を押すと操縦を再開できます。";
  }

  return;
}


// STOP・STOP解除の状態を受信した場合
if (command.type === "drive-stop-state") {
  applyDriveStopState(command.stopped === true);
  return;
}

    // 操縦命令を受信した場合
    if (command.type === "drive") {

      // 非常停止中は，0以外の操縦命令をすべて無視する
      if (
        driveStopped &&
        (command.x !== 0 || command.y !== 0)
      ) {
        console.log(
          "非常停止中のため操縦命令を無視しました",
          command
        );

        driveStatusElement.textContent =
          "非常停止中です。操縦命令を無視しました。";

        return;
      }

      driveStatusElement.textContent =
        "操縦命令を受信しました。\n" +
        "X：" + command.x + "\n" +
        "Y：" + command.y + "\n" +
        "sequence：" + command.sequence;
    }

  } catch (error) {
    console.error(
      "受信データをJSONとして読めませんでした",
      error
    );

    setStatus("受信データの読み取りに失敗しました。");
  }
}

   videoWrapper.addEventListener("pointermove", event => {
  if (
    role !== "viewer" ||
    !joystickActive ||
    driveStopped ||
    settingsPanel.open ||
    stopEditorActive
  ) {
    return;
  }

  // 以下ジョイスティック移動処理

  const rect = videoWrapper.getBoundingClientRect();

  const pointerX = event.clientX - rect.left;
  const pointerY = event.clientY - rect.top;

  let dx = pointerX - joystickCenterX;
  let dy = pointerY - joystickCenterY;

  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance > maxKnobDistance) {
    dx = dx / distance * maxKnobDistance;
    dy = dy / distance * maxKnobDistance;
  }

  joystickKnob.style.left =
    (joystickRadius + dx) + "px";

  joystickKnob.style.top =
    (joystickRadius + dy) + "px";

    

  const x = dx / maxKnobDistance;
  const y = -dy / maxKnobDistance;

  xyDisplay.textContent =
    "X：" + x.toFixed(2) +
    "　Y：" + y.toFixed(2);

  if (driveChannel &&
      driveChannel.readyState === "open") {

    driveSequence++;

    const driveData = {
      type: "drive",
      x: Number(x.toFixed(2)),
      y: Number(y.toFixed(2)),
      sequence: driveSequence
    };

    driveChannel.send(JSON.stringify(driveData));
  }
});


sendButton.addEventListener("click", startSender);
viewButton.addEventListener("click", startViewer);

function toggleDriveStop(event) {
  event.preventDefault();
  event.stopPropagation();

  // STOPボタン編集中は操作しない
  if (stopEditorActive) {
    return;
  }

  // 自分または相手が詳細設定中なら解除しない
  if (
    settingsPanel.open ||
    remoteSettingsActive
  ) {
    return;
  }

  const newStoppedState = !driveStopped;

  if (newStoppedState) {

    // 押した端末を直ちに非常停止にする
    applyDriveStopState(true);

    // 相手へX=0，Y=0を送る
    sendStopCommand();

    // 相手側も非常停止表示にする
    sendDriveStopState(true);

  } else {

    // 押した端末の非常停止を解除する
    applyDriveStopState(false);

    // 相手側も解除する
    sendDriveStopState(false);
  }
}

driveStopButton.addEventListener(
  "pointerdown",
  toggleDriveStop
);
    
stopButton.addEventListener("click", () => stopAll(true));

    window.addEventListener("beforeunload", () => {
      stopAll(false);
    });

    // ======================================
// 詳細設定の保存
// ======================================

function loadSettings() {

  const savedPcKey =
    localStorage.getItem("pcStopKey");

  if (savedPcKey !== null) {
    pcStopKey.value = savedPcKey;
  }

  const savedGesture =
    localStorage.getItem(
      "iphoneStopGesture"
    );

  if (savedGesture !== null) {
    iphoneStopGesture.value =
      savedGesture;
  }
}


function saveSettings() {

  localStorage.setItem(
    "pcStopKey",
    pcStopKey.value
  );

  localStorage.setItem(
    "iphoneStopGesture",
    iphoneStopGesture.value
  );
}


// ----------
// 変更されたら保存
// ----------

pcStopKey.addEventListener(
  "change",
  saveSettings
);

iphoneStopGesture.addEventListener(
  "change",
  saveSettings
);




// ----------
// 起動時に読み込み
// ----------

loadSettings();
    
  </script>
