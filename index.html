<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>WebRTC 手動接続テスト</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      line-height: 1.5;
      background: #f4f5f7;
      color: #111;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    h1 { font-size: 22px; margin-top: 0; }
    h2 { font-size: 18px; margin: 24px 0 8px; }
    button {
      font-size: 17px;
      padding: 12px 14px;
      margin: 5px 4px 5px 0;
      border: 0;
      border-radius: 10px;
      background: #1769e0;
      color: white;
    }
    button.secondary { background: #59636e; }
    button:disabled { opacity: .45; }
    textarea, input {
      box-sizing: border-box;
      width: 100%;
      font-size: 16px;
      padding: 10px;
      border: 1px solid #aab0b7;
      border-radius: 8px;
      background: white;
      color: #111;
    }
    textarea { min-height: 150px; font-family: monospace; }
    #message { min-height: 48px; }
    #log {
      white-space: pre-wrap;
      background: #111;
      color: #eee;
      padding: 10px;
      min-height: 100px;
      border-radius: 8px;
      font-size: 13px;
    }
    .status {
      padding: 10px;
      border-radius: 8px;
      background: #e8edf3;
      font-weight: 600;
    }
    .note { font-size: 14px; color: #555; }
    @media (prefers-color-scheme: dark) {
      body { background: #17191c; color: #eee; }
      main { background: #25282c; }
      textarea, input { background: #17191c; color: #eee; border-color: #707780; }
      .status { background: #363b42; }
      .note { color: #c3c7cc; }
    }
  </style>
</head>
<body>
<main>
  <h1>WebRTC 手動接続テスト</h1>

  <div class="status">状態：<span id="status">未開始</span></div>
  <p class="note">
    端末AでOfferを作り，端末BでAnswerを作ります。接続後，文字を送って通信確認します。
  </p>

  <h2>端末A：Offerを作る</h2>
  <button id="makeOffer">1．Offerを作成</button>
  <button class="secondary" data-copy="localText">コピー</button>

  <h2>端末B：Offerを受け取りAnswerを作る</h2>
  <button id="acceptOffer">2．貼り付けたOfferからAnswerを作成</button>

  <h2>この端末が作った接続情報</h2>
  <textarea id="localText" readonly placeholder="OfferまたはAnswerがここに表示されます"></textarea>
  <button class="secondary" data-copy="localText">コピー</button>

  <h2>相手から受け取った接続情報</h2>
  <textarea id="remoteText" placeholder="相手から届いたOfferまたはAnswerを貼り付けます"></textarea>
  <button id="acceptAnswer">3．端末AでAnswerを登録</button>

  <h2>通信テスト</h2>
  <input id="message" value="学校Wi-Fiからテスト送信">
  <button id="send" disabled>送信</button>

  <h2>記録</h2>
  <div id="log"></div>

  <button id="reset" class="secondary">最初からやり直す</button>
</main>

<script>
(() => {
  "use strict";

  let pc = null;
  let channel = null;

  const statusEl = document.getElementById("status");
  const localText = document.getElementById("localText");
  const remoteText = document.getElementById("remoteText");
  const messageInput = document.getElementById("message");
  const sendButton = document.getElementById("send");
  const logEl = document.getElementById("log");

  function log(text) {
    const time = new Date().toLocaleTimeString();
    logEl.textContent += `[${time}] ${text}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(text) {
    statusEl.textContent = text;
    log(text);
  }

  function setupChannel(dc) {
    channel = dc;

    channel.onopen = () => {
      setStatus("接続成功");
      sendButton.disabled = false;
    };

    channel.onclose = () => {
      setStatus("通信チャンネル終了");
      sendButton.disabled = true;
    };

    channel.onerror = (event) => {
      console.error(event);
      setStatus("通信チャンネルでエラー");
    };

    channel.onmessage = (event) => {
      log("受信：" + event.data);
      alert("相手から受信しました：\n" + event.data);
    };
  }

  function createPeer() {
    if (pc) pc.close();

    pc = new RTCPeerConnection({
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    });

    pc.onconnectionstatechange = () => {
      setStatus("接続状態：" + pc.connectionState);
    };

    pc.oniceconnectionstatechange = () => {
      log("ICE状態：" + pc.iceConnectionState);
    };

    pc.onicecandidateerror = (event) => {
      log("ICE候補エラー：" + (event.errorText || event.errorCode || "不明"));
    };

    pc.ondatachannel = (event) => {
      log("相手のデータチャンネルを受信");
      setupChannel(event.channel);
    };

    return pc;
  }

  function waitForIceGatheringComplete(peer, timeoutMs = 15000) {
    if (peer.iceGatheringState === "complete") return Promise.resolve();

    return new Promise((resolve) => {
      const timeout = setTimeout(() => {
        peer.removeEventListener("icegatheringstatechange", check);
        log("ICE候補収集を15秒で打ち切りました");
        resolve();
      }, timeoutMs);

      function check() {
        if (peer.iceGatheringState === "complete") {
          clearTimeout(timeout);
          peer.removeEventListener("icegatheringstatechange", check);
          resolve();
        }
      }

      peer.addEventListener("icegatheringstatechange", check);
    });
  }

  function parseDescription(text) {
    const value = JSON.parse(text.trim());
    if (!value || !value.type || !value.sdp) {
      throw new Error("接続情報の形式が正しくありません");
    }
    return value;
  }

  document.getElementById("makeOffer").onclick = async () => {
    try {
      localText.value = "";
      createPeer();
      setupChannel(pc.createDataChannel("test"));
      setStatus("Offerを作成中");

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitForIceGatheringComplete(pc);

      localText.value = JSON.stringify(pc.localDescription);
      setStatus("Offer完成。端末Bへコピーしてください");
    } catch (error) {
      console.error(error);
      setStatus("Offer作成失敗：" + error.message);
    }
  };

  document.getElementById("acceptOffer").onclick = async () => {
    try {
      localText.value = "";
      const offer = parseDescription(remoteText.value);
      createPeer();
      setStatus("Offerを登録中");

      await pc.setRemoteDescription(offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await waitForIceGatheringComplete(pc);

      localText.value = JSON.stringify(pc.localDescription);
      setStatus("Answer完成。端末Aへコピーしてください");
    } catch (error) {
      console.error(error);
      setStatus("Answer作成失敗：" + error.message);
    }
  };

  document.getElementById("acceptAnswer").onclick = async () => {
    try {
      if (!pc) throw new Error("先に端末AでOfferを作ってください");
      const answer = parseDescription(remoteText.value);
      await pc.setRemoteDescription(answer);
      setStatus("Answer登録完了。接続を待っています");
    } catch (error) {
      console.error(error);
      setStatus("Answer登録失敗：" + error.message);
    }
  };

  sendButton.onclick = () => {

    if (!channel || channel.readyState !== "open") {
        setStatus("まだ接続されていません");
        return;
    }

    const command = {
        type: "drive",
        x: 0.5,
        y: 0.8,
        sequence: 1
    };

    channel.send(JSON.stringify(command));

    log("送信：" + JSON.stringify(command));
};

  document.querySelectorAll("[data-copy]").forEach((button) => {
    button.onclick = async () => {
      const target = document.getElementById(button.dataset.copy);
      if (!target.value) {
        alert("コピーする接続情報がありません");
        return;
      }

      try {
        await navigator.clipboard.writeText(target.value);
        alert("コピーしました");
      } catch {
        target.focus();
        target.select();
        target.setSelectionRange(0, target.value.length);
        alert("選択しました。表示されたコピー操作を押してください");
      }
    };
  });

  document.getElementById("reset").onclick = () => {
    if (channel) channel.close();
    if (pc) pc.close();
    pc = null;
    channel = null;
    localText.value = "";
    remoteText.value = "";
    logEl.textContent = "";
    sendButton.disabled = true;
    statusEl.textContent = "未開始";
  };
})();
</script>
</body>
</html>
